services:
  db:
    image: postgres:16

    environment:
      POSTGRES_DB: events_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "events_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      POSTGRES_HOST: db

    depends_on:
      - db

    restart: unless-stopped

    command: uvicorn src.app:app --host 0.0.0.0 --port 8000

    expose:
      - "8000"

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app


volumes:
  postgres_data: