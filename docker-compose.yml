services:
  db:
    image: postgres:16

    environment:
      POSTGRES_DB: events_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db

    command: uvicorn src.app:app --host 0.0.0.0 --port 8000
  
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app


volumes:
  postgres_data: